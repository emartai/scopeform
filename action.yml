name: Scopeform Deploy
description: Install Scopeform, issue a scoped agent token, and export SCOPEFORM_TOKEN for later workflow steps.
branding:
  icon: shield
  color: green

inputs:
  token:
    description: Scopeform user token stored in GitHub Actions secrets (SCOPEFORM_TOKEN).
    required: true
  api-url:
    description: Override the Scopeform API base URL.
    required: false
    default: https://scopeform-production-f0b7.up.railway.app
  python-version:
    description: Python version used to install and run the Scopeform CLI.
    required: false
    default: "3.11"
  working-directory:
    description: Directory containing scopeform.yml.
    required: false
    default: .

runs:
  using: composite
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install Scopeform CLI
      shell: bash
      run: pip install scopeform

    - name: Deploy agent and issue scoped token
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SCOPEFORM_TOKEN: ${{ inputs.token }}
      run: scopeform deploy --api-url "${{ inputs.api-url }}"

    - name: Export SCOPEFORM_TOKEN to workflow environment
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        echo "SCOPEFORM_TOKEN=$(grep '^SCOPEFORM_TOKEN=' .env | cut -d= -f2-)" >> "$GITHUB_ENV"

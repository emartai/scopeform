name: Claim issue

# Self-serve issue claiming: commenting "/claim" on an issue assigns it to you.
# No maintainer bottleneck, and no PR is ever auto-closed.

on:
  issue_comment:
    types: [created]

permissions:
  issues: write

jobs:
  claim:
    if: ${{ !github.event.issue.pull_request && startsWith(github.event.comment.body, '/claim') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const me = context.payload.comment.user.login;
            const issue_number = context.issue.number;
            const { owner, repo } = context.repo;
            const { data: iss } = await github.rest.issues.get({ owner, repo, issue_number });
            const assignees = iss.assignees || [];
            if (assignees.length && !assignees.some((a) => a.login === me)) {
              await github.rest.issues.createComment({
                owner, repo, issue_number,
                body: `Thanks @${me}! This one is already claimed by @${assignees[0].login}. Pick another issue labelled \`good first issue\` and comment \`/claim\` there. 🙂`,
              });
              return;
            }
            await github.rest.issues.addAssignees({ owner, repo, issue_number, assignees: [me] });
            await github.rest.issues.createComment({
              owner, repo, issue_number,
              body: `You have claimed this, @${me} — it is yours! 🚀\n\nWhen you open a PR, reference this issue (e.g. **Closes #${issue_number}**) so it links up and closes on merge. Ask anything right here. See [CONTRIBUTING](https://github.com/emartai/.github/blob/main/CONTRIBUTING.md).`,
            });

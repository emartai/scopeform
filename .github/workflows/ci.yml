name: CI

on:
  pull_request:

jobs:
  test-api:
    name: test-api
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: scopeform
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d scopeform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/scopeform
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-jwt-secret
      JWT_ALGORITHM: HS256
      JWT_EXPIRE_MINUTES: "60"
      CLERK_SECRET_KEY: sk_test_ci
      CLERK_PUBLISHABLE_KEY: pk_test_ci
      CLERK_API_URL: https://api.clerk.com
      API_HOST: 0.0.0.0
      API_PORT: "8000"
      APP_ENV: test
      CORS_ORIGINS: http://localhost:3000
      PYTHONPATH: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install API dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r api/requirements.txt
          pip install pytest-cov pip-audit ruff

      - name: Run migrations
        run: alembic upgrade head

      - name: Run pytest with coverage
        run: pytest api/tests --cov=api --cov-report=term-missing --cov-fail-under=80

      - name: Run pip audit
        run: pip-audit -r api/requirements.txt --strict

      - name: Run Ruff
        run: ruff check api cli-py

  test-cli-py:
    name: test-cli-py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python CLI
        run: |
          python -m pip install --upgrade pip
          pip install ./cli-py[dev]

      - name: Run CLI tests
        env:
          PYTHONPATH: cli-py
        run: pytest cli-py/tests

  test-cli-node:
    name: test-cli-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: cli-node/package-lock.json

      - name: Install dependencies
        working-directory: cli-node
        run: npm ci

      - name: Run Node CLI tests
        working-directory: cli-node
        run: npm test -- --runInBand

      - name: Run npm audit
        working-directory: cli-node
        run: npm audit --audit-level=high

  test-web:
    name: test-web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Run Next build
        working-directory: web
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_ci
          CLERK_SECRET_KEY: sk_test_ci
        run: npm run build

      - name: Install Playwright browsers
        working-directory: web
        run: npx playwright@1.52.0 install --with-deps chromium

      - name: Run Playwright tests
        working-directory: web
        run: npx playwright@1.52.0 test --pass-with-no-tests

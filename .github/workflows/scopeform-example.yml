# ─────────────────────────────────────────────────────────────────────────────
# SCOPEFORM EXAMPLE WORKFLOW
# Copy this into your own agent repo and add SCOPEFORM_TOKEN to your secrets.
#
# How to get your token:
#   1. Sign up at https://scopeform-web.vercel.app/sign-up
#   2. Run: scopeform login && cat ~/.scopeform/config.json
#   3. Copy the "token" value → repo Settings → Secrets → SCOPEFORM_TOKEN
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy agent with Scopeform

# Keep workflow_dispatch so this reference workflow never runs automatically
# in this repo. In your own repo, change to: push: branches: [main]
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Scopeform CLI
        run: pip install scopeform

      - name: Deploy agent and issue scoped token
        # SCOPEFORM_TOKEN env var is read automatically — no login step needed
        run: scopeform deploy
        env:
          SCOPEFORM_TOKEN: ${{ secrets.SCOPEFORM_TOKEN }}

      - name: Load issued token into environment
        run: echo "AGENT_TOKEN=$(grep '^SCOPEFORM_TOKEN=' .env | cut -d= -f2-)" >> "$GITHUB_ENV"

      # ── Replace the step below with your actual agent entrypoint ───────────
      - name: Run agent
        run: python agent.py
        env:
          SCOPEFORM_TOKEN: ${{ env.AGENT_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

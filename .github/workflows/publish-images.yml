name: Publish Docker images

# Builds the API and dashboard images that `scopeform up` pulls
# (ghcr.io/emartai/scopeform-api and ghcr.io/emartai/scopeform-web).

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "web/**"
      - "alembic.ini"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/publish-images.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: scopeform-api
            dockerfile: api/Dockerfile
          - image: scopeform-web
            dockerfile: web/Dockerfile
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/emartai/${{ matrix.image }}:latest
            ghcr.io/emartai/${{ matrix.image }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # NOTE: the secrets context is not available in job-level `if`, so the
      # guard lives inside the step — skips green when no token is configured.
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not configured — skipping deploy."
            exit 0
          fi
          npx -y @railway/cli up --service api

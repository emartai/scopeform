services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: scopeform
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d scopeform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://user:pass@postgres:5432/scopeform
      REDIS_URL: redis://redis:6379
      # Override these in a .env file next to this compose file (see .env.example).
      JWT_SECRET: ${JWT_SECRET:-replace-with-64-char-hex-string}
      JWT_ALGORITHM: HS256
      # REQUIRED for adding provider API keys — see .env.example for how to generate.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-}
      API_BASE_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./api:/app/api
      - ./alembic.ini:/app/alembic.ini
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  postgres_data:
